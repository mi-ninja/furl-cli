name: Build and attach release artifact

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            cargo_target: x86_64-unknown-linux-gnu
          - os: macos-14
            platform: macos-x86_64
            cargo_target: x86_64-apple-darwin
          - os: macos-14
            platform: macos-aarch64
            cargo_target: aarch64-apple-darwin
          - os: windows-latest
            platform: windows-x86_64
            cargo_target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.cargo_target }}
          override: true

      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.cargo_target }}

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.cargo_target }}/release/furl artifacts/
          tar -czf artifacts/furl-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz -C artifacts furl

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force artifacts
          Copy-Item -Path target\${{ matrix.cargo_target }}\release\furl.exe -Destination artifacts\
          Compress-Archive -Path artifacts\furl.exe -DestinationPath artifacts\furl-${{ github.ref_name }}-${{ matrix.platform }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: furl-cli-${{ matrix.platform }}
          path: |
            artifacts/*.tar.gz
            artifacts/*.zip

  publish_release_asset:
    name: Attach artifact to GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded

      - name: Create or update release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: downloaded/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
